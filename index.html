<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>풀스크린 타이머 및 메모</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <style>
        .timer-display { font-size: 15vw; font-weight: 800; font-family: monospace; }
        .control-btn { opacity: 0.5; transition: opacity 0.2s; }
        .control-btn:hover { opacity: 1; }
    </style>
</head>
<body class="bg-gray-100 min-h-screen p-4">

    <div class="grid grid-cols-1 md:grid-cols-2 gap-6 w-full">
        <!-- 타이머 섹션 -->
        <div class="bg-white p-6 rounded-2xl shadow-sm flex flex-col items-center justify-center">
            <div id="timer" class="timer-display text-gray-800">00:00</div>
            
            <div class="flex gap-2 mb-6">
                <button onclick="setTimer(1)" class="bg-blue-100 px-3 py-1 rounded text-sm">+1분</button>
                <button onclick="setTimer(5)" class="bg-blue-100 px-3 py-1 rounded text-sm">+5분</button>
                <button onclick="resetTimer()" class="bg-red-100 px-3 py-1 rounded text-sm text-red-600">초기화</button>
            </div>

            <div class="flex gap-6 mt-4">
                <button onclick="startTimer()" class="control-btn text-2xl">▶</button>
                <button onclick="pauseTimer()" class="control-btn text-2xl">||</button>
                <button onclick="resetTimer()" class="control-btn text-2xl">↺</button>
            </div>
        </div>

        <!-- 메모장 섹션 -->
        <div class="bg-white p-6 rounded-2xl shadow-sm flex flex-col">
            <!-- 한 줄로 정리된 메뉴 -->
            <div class="flex items-center justify-between border-b pb-3 mb-3 text-sm text-gray-500">
                <span class="font-bold text-gray-800">메모장</span>
                <div class="flex gap-4">
                    <button>저장</button>
                    <button>복사</button>
                    <button>지우기</button>
                </div>
            </div>
            <textarea class="w-full flex-grow p-2 border-0 focus:ring-0 resize-none" placeholder="내용을 입력하세요..."></textarea>
        </div>
    </div>

    <script>
        let timeLeft = 0;
        let timerInterval;

        function updateDisplay() {
            const mins = Math.floor(timeLeft / 60);
            const secs = timeLeft % 60;
            document.getElementById('timer').innerText = 
                `${mins.toString().padStart(2, '0')}:${secs.toString().padStart(2, '0')}`;
        }

        function setTimer(minutes) {
            timeLeft += minutes * 60;
            updateDisplay();
        }

        function resetTimer() {
            timeLeft = 0;
            clearInterval(timerInterval);
            updateDisplay();
        }

        function startTimer() {
            clearInterval(timerInterval);
            timerInterval = setInterval(() => {
                if (timeLeft > 0) {
                    timeLeft--;
                    updateDisplay();
                } else {
                    clearInterval(timerInterval);
                }
            }, 1000);
        }

        function pauseTimer() {
            clearInterval(timerInterval);
        }
    </script>
</body>
</html>
